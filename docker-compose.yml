services:
  db:
    image: postgres:17
    container_name: pork_db
    env_file:
      - db/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pork_pgadmin
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - db
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pork_api
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped
volumes:
  postgres_data: